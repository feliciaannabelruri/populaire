  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ly:var(--disp);font-weight:600;font-size:28px;line-height:1.25;color:var(--ink);\">{{ currentQuote }}<\u002Fdiv>\n              <div style=\"margin-top:12px;display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;font-weight:700;font-size:15px;padding:8px 14px;border-radius:999px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><circle cx=\"17.5\" cy=\"6.5\" r=\"1\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg> Share to Instagram<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:none;text-align:center;\">\n              <img src=\"c138001b-67a2-433b-8616-35c042d127a0\" style=\"width:104px;height:104px;display:block;border-radius:12px;\">\n              <div style=\"font-size:14px;color:var(--soft);font-weight:600;margin-top:6px;\">Scan to share<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:50%;bottom:6px;transform:translateX(-50%);display:flex;gap:13px;\">\n        <sc-for list=\"{{ moodDots }}\" as=\"d\" hint-placeholder-count=\"6\">\n          <span style=\"width:14px;height:14px;border-radius:50%;background:{{ d.color }};transition:background .3s;\"><\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONTROL BAR -->\n  <div class=\"pad-sec\" style=\"max-width:1200px;margin:0 auto;padding:0 32px 56px;\">\n    <div class=\"ctl-bar\" style=\"background:#fff;border:1px solid var(--line);border-radius:22px;padding:22px 28px;display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;box-shadow:0 14px 40px rgba(120,60,40,.08);\">\n      <span style=\"font-family:var(--disp);font-weight:600;font-size:18px;color:var(--soft);\">Controls:<\u002Fspan> 680px;margin:0 auto 48px;\">\n        <div style=\"font-family:var(--disp);font-weight:600;font-size:18px;color:var(--red);letter-spacing:.06em;text-transform:uppercase;\">How it works<\u002Fdiv>\n        <h2 style=\"font-family:var(--disp);font-weight:600;font-size:46px;line-height:1.08;margin:10px 0 0;\">One double-wall cup. Three layers of delight.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"grid-3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px;\">\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px 30px;\">\n          <div style=\"width:56px;height:56px;border-radius:16px;background:var(--pink-soft);color:var(--pink);font-family:var(--disp);font-weight:700;font-size:26px;display:flex;align-items:center;justify-content:center;\">1<\u002Fdiv>\n          <div style=\"font-family:var(--disp);font-weight:600;font-size:28px;margin:18px 0 8px;\">Rotating mood sleeve<\u002Fdiv>\n          <p style=\"font-size:18px;color:var(--soft);line-height:1.55;margin:0;\">The outer wall spins over a fixed inner cup. A window shows one of 6 expressions — Senang, Baper, Semangat, Santai, Capek, Sedih.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px 30px;\">\n          <div style=\"width:56px;height:56px;border-radius:16px;background:#F0E5D8;color:var(--choc);font-family:var(--disp);font-weight:700;font-size:26px;display:flex;align-items:center;justify-content:center;\">2<\u002Fdiv>\n          <div style=\"font-family:var(--disp);font-weight:600;font-size:28px;margin:18px 0 8px;\">Opaque base — no peeking<\u002Fdiv>\n          <p style=\"font-size:18px;color:var(--soft);line-height:1.55;margin:0;\">A food-safe false bottom keeps the quote hidden and unreadable until the cup is truly finished. The surprise stays a surprise.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px 30px;\">\n          <div style=\"width:56px;height:56px;border-radius:16px;background:#FCE0E0;color:var(--red);font-family:var(--disp);font-weight:700;font-size:26px;display:flex;align-items:center;justify-content:center;\">3<\u002Fdiv>\n          <div style=\"font-family:var(--disp);font-weight:600;font-size:28px;margin:18px 0 8px;\">Quote + QR at the bottom<\u002Fdiv>\n          <p style=\"font-size:18px;color:var(--soft);line-height:1.55;margin:0;\">A mood-matched affirmation and a QR to share it, explore more quotes, or unlock Birthday promos. Low-cost — just a smarter cup.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MOODS -->\n  <div id=\"moods\" class=\"pad-sec\" style=\"max-width:1200px;margin:0 auto;padding:72px 32px;\">\n    <div style=\"text-align:center;max-width:680px;margin:0 auto 44px;\">\n      <div style=\"font-family:var(--disp);font-weight:600;font-size:18px;color:var(--red);letter-spacing:.06em;text-transform:uppercase;\">Six moods<\u002Fdiv>\n      <h2 style=\"font-family:var(--disp);font-weight:600;font-size:46px;line-height:1.08;margin:10px 0 0;\">However you feel, there's a cup for it.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"grid-3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;gap:18px;align-items:center;\"><div style=\"flex:none;width:74px;height:74px;border-radius:50%;background:#FFF3D6;display:flex;align-items:center;justify-content:center;font-size:42px;\">😄<\u002Fdiv><div><div style=\"font-family:var(--disp);font-weight:700;font-size:24px;color:#E9A916;\">SENANG<\u002Fdiv><div style=\"font-size:17px;color:var(--soft);line-height:1.4;\">Kalau kamu bisa menghabiskan es krim ini, kamu juga bisa melewati hari ini, ciayou!<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;gap:18px;align-items:center;\"><div style=\"flex:none;width:74px;height:74px;border-radius:50%;background:#FCE1EA;display:flex;align-items:center;justify-content:center;font-size:42px;\">🥰<\u002Fdiv><div><div style=\"font-family:var(--disp);font-weight:700;font-size:24px;color:var(--pink);\">BAPER<\u002Fdiv><div style=\"font-size:17px;color:var(--soft);line-height:1.4;\">Kamu lebih manis dari suapan terakhir ini.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;gap:18px;align-items:center;\"><div style=\"flex:none;width:74px;height:74px;border-radius:50%;background:#FFE6D2;display:flex;align-items:center;justify-content:center;font-size:42px;\">🤩<\u002Fdiv><div><div style=\"font-family:var(--disp);font-weight:700;font-size:24px;color:#E96E1F;\">SEMANGAT<\u002Fdiv><div style=\"font-size:17px;color:var(--soft);line-height:1.4;\">Gas terus! Sisihin satu suap buat rayain menang nanti.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;gap:18px;align-items:center;\"><div style=\"flex:none;width:74px;height:74px;border-radius:50%;background:#DCF1E8;display:flex;align-items:center;justify-content:center;font-size:42px;\">😌<\u002Fdiv><div><div style=\"font-family:var(--disp);font-weight:700;font-size:24px;color:#4FA888;\">SANTAI<\u002Fdiv><div style=\"font-size:17px;color:var(--soft);line-height:1.4;\">Pelan-pelan aja. Hal terbaik emang meleleh paling lama.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;gap:18px;align-items:center;\"><div style=\"flex:none;width:74px;height:74px;border-radius:50%;background:#E9E3F7;display:flex;align-items:center;justify-content:center;font-size:42px;\">😮‍💨<\u002Fdiv><div><div style=\"font-family:var(--disp);font-weight:700;font-size:24px;color:#7C6BC0;\">CAPEK<\u002Fdiv><div style=\"font-size:17px;color:var(--soft);line-height:1.4;\">Rehat dulu. Kamu udah cukup hebat buat hari ini.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;gap:18px;align-items:center;\"><div style=\"flex:none;width:74px;height:74px;border-radius:50%;background:#DDEBF8;display:flex;align-items:center;justify-content:center;font-size:42px;\">🥺<\u002Fdiv><div><div style=\"font-family:var(--disp);font-weight:700;font-size:24px;color:#5E92C7;\">SEDIH<\u002Fdiv><div style=\"font-size:17px;color:var(--soft);line-height:1.4;\">Gapapa. Hal kecil hari ini tetap layak dirayain.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- EDITIONS -->\n  <div id=\"editions\" style=\"background:var(--red);color:#fff;\">\n    <div class=\"pad-sec\" style=\"max-width:1200px;margin:0 auto;padding:72px 32px;\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:40px;\">\n        <div>\n          <div style=\"font-family:var(--disp);font-weight:600;font-size:18px;color:#FFD9D6;letter-spacing:.06em;text-transform:uppercase;\">Campaign editions<\u002Fdiv>\n          <h2 style=\"font-family:var(--disp);font-weight:600;font-size:46px;line-height:1.05;margin:10px 0 0;\">The same cup, endlessly fresh.<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"font-family:var(--disp);font-weight:600;font-size:24px;color:#FFE3A8;\">#JajanWallsPopulaire<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"grid-3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n        <div style=\"background:#fff;color:var(--ink);border-radius:20px;padding:30px;\"><img src=\"0e2c2b39-7ca0-47b9-b217-947c8677b7f0\" style=\"width:46px;height:46px;\"><div style=\"font-family:var(--disp);font-weight:700;font-size:26px;margin:14px 0 6px;\">Birthday Edition<\u002Fdiv><div style=\"font-size:18px;color:var(--soft);line-height:1.5;\">34 collectible quotes for Wall's 34th anniversary month — urgency and collectibility built in.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;color:var(--ink);border-radius:20px;padding:30px;\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E5322B\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 4H7a2 2 0 0 0-2 2v3l-2 2 4 4 2-2h2\"><\u002Fpath><path d=\"M13 20h4a2 2 0 0 0 2-2v-3l2-2-4-4-2 2h-2\"><\u002Fpath><\u002Fsvg><div style=\"font-family:var(--disp);font-weight:700;font-size:26px;margin:14px 0 6px;\">Collab Edition<\u002Fdiv><div style=\"font-size:18px;color:var(--soft);line-height:1.5;\">Artist &amp; IP tie-ins — co-created quote sets that ride other fandoms into new audiences.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;color:var(--ink);border-radius:20px;padding:30px;\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E5322B\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 10L12 5 2 10l10 5 10-5z\"><\u002Fpath><path d=\"M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5\"><\u002Fpath><\u002Fsvg><div style=\"font-family:var(--disp);font-weight:700;font-size:26px;margin:14px 0 6px;\">Seasonal Edition<\u002Fdiv><div style=\"font-size:18px;color:var(--soft);line-height:1.5;\">Lebaran, graduation, back-to-school — themes rotate without any new SKU complexity.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div class=\"pad-sec\" style=\"max-width:1200px;margin:0 auto;padding:48px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;\">\n    <div style=\"display:flex;align-items:center;gap:28px;opacity:.85;\">\n      <img src=\"fb2ece5e-cd9b-4052-80bf-ad009881e50e\" style=\"height:30px;\">\n      <img src=\"79369ab4-5cec-4905-bc4d-093029cebaa2\" style=\"height:26px;\">\n      <img src=\"59f0f579-6667-4084-ad31-1a8211bee0aa\" style=\"height:24px;\">\n    <\u002Fdiv>\n    <div style=\"font-size:16px;color:var(--soft);font-weight:500;\">Concept demo · Team Park Deyum · #SemuaJadiHappy<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:820},&quot;defaultFlavor&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;strawberry&quot;,&quot;chocolate&quot;],&quot;default&quot;:&quot;strawberry&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultMood&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;0&quot;,&quot;1&quot;,&quot;2&quot;,&quot;3&quot;,&quot;4&quot;,&quot;5&quot;],&quot;default&quot;:&quot;0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;birthdayEdition&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { mood: 0, bites: 0, flavor: null, spin: 0 };\n\n  componentDidMount() {\n    const dm = parseInt(this.props.defaultMood, 10);\n    if (!isNaN(dm) && dm >= 0 && dm < 6) this.setState({ mood: dm });\n  }\n\n  faceSvg(idx, stroke) {\n    const s = stroke || '#3A2A26';\n    const base = (inner) => '<svg viewBox=\"0 0 100 100\" width=\"100%\" height=\"100%\" fill=\"none\" stroke=\"' + s + '\" stroke-width=\"5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">' + inner + '<\u002Fsvg>';\n    const cheek = '<circle cx=\"26\" cy=\"60\" r=\"6\" fill=\"#F7B6CB\" stroke=\"none\"/><circle cx=\"74\" cy=\"60\" r=\"6\" fill=\"#F7B6CB\" stroke=\"none\"/>';\n    const faces = [\n      // SENANG — happy\n      base('<path d=\"M28 44 Q36 36 44 44\"/><path d=\"M56 44 Q64 36 72 44\"/><path d=\"M32 58 Q50 76 68 58\"/>' + cheek),\n      // BAPER — in love (heart eyes)\n      base('<path d=\"M30 38c-5-5-12 1-7 6l7 7 7-7c5-5-2-11-7-6z\" fill=\"#F2789F\" stroke=\"#F2789F\" stroke-width=\"3\"/><path d=\"M70 38c-5-5-12 1-7 6l7 7 7-7c5-5-2-11-7-6z\" fill=\"#F2789F\" stroke=\"#F2789F\" stroke-width=\"3\"/><path d=\"M34 62 Q50 74 66 62\"/>' + cheek),\n      // SEMANGAT — excited (big grin + sparkle)\n      base('<path d=\"M28 42 Q36 34 44 42\"/><path d=\"M56 42 Q64 34 72 42\"/><path d=\"M32 56 Q50 78 68 56 Z\" fill=\"#3A2A26\" stroke=\"none\"/><path d=\"M50 60 Q50 68 50 68\" stroke=\"#fff\" stroke-width=\"3\"/><path d=\"M82 24 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2 z\" fill=\"#FFC83D\" stroke=\"none\"/>'),\n      // SANTAI — chill (relaxed)\n      base('<path d=\"M30 46 Q37 50 44 46\"/><path d=\"M56 46 Q63 50 70 46\"/><path d=\"M40 60 Q50 67 60 60\"/>'),\n      // CAPEK — tired (half-lidded + sigh)\n      base('<path d=\"M28 40 Q37 46 46 41\"/><path d=\"M54 41 Q63 46 72 40\"/><path d=\"M30 46 h13\"/><path d=\"M57 46 h13\"/><path d=\"M44 63 Q50 60 56 63\"/>'),\n      // SEDIH — sad (worried)\n      base('<path d=\"M28 40 Q37 34 45 40\"/><path d=\"M55 40 Q63 34 72 40\"/><circle cx=\"36\" cy=\"50\" r=\"3.2\" fill=\"#3A2A26\" stroke=\"none\"/><circle cx=\"64\" cy=\"50\" r=\"3.2\" fill=\"#3A2A26\" stroke=\"none\"/><path d=\"M36 66 Q50 56 64 66\"/><path d=\"M70 54 q4 8 0 11 q-4 -3 0 -11z\" fill=\"#7FB1E0\" stroke=\"none\"/>'),\n    ];\n    return faces[idx];\n  }\n\n  faceEl(idx) {\n    return React.createElement('span', {\n      style: { display:'block', width:'78%', height:'78%' },\n      dangerouslySetInnerHTML: { __html: this.faceSvg(idx) }\n    });\n  }\n\n  get moodList() {\n    return [\n      { label:'SENANG', emoji:'😄', color:'#FFC83D', deep:'#E9A916',\n        quote:'Hari ini punyamu — habisin sampai senyum terakhir.',\n        bday:'34 tahun Wall\\u2019s, dan hari bahagiamu baru aja mulai.' },\n      { label:'BAPER', emoji:'🥰', color:'#F2789F', deep:'#D85583',\n        quote:'Kamu lebih manis dari suapan terakhir ini.',\n        bday:'Spesial kayak kamu — selamat ulang tahun ke-34, Wall\\u2019s!' },\n      { label:'SEMANGAT', emoji:'🤩', color:'#FF8A3D', deep:'#E96E1F',\n        quote:'Gas terus! Sisihin satu suap buat rayain menang nanti.',\n        bday:'34 alasan buat semangat — yang ke-35 kamu yang bikin.' },\n      { label:'SANTAI', emoji:'😌', color:'#6FC8A6', deep:'#4FA888',\n        quote:'Pelan-pelan aja. Hal terbaik emang meleleh paling lama.',\n        bday:'Rayain pelan-pelan — 34 tahun nggak dibangun semalam.' },\n      { label:'CAPEK', emoji:'😮‍💨', color:'#9C8BD6', deep:'#7C6BC0',\n        quote:'Rehat dulu. Kamu udah cukup hebat buat hari ini.',\n        bday:'Istirahat itu hadiah. Wall\\u2019s temani ulang tahun ke-34.' },\n      { label:'SEDIH', emoji:'🥺', color:'#7FB1E0', deep:'#5E92C7',\n        quote:'Gapapa. Hal kecil hari ini tetap layak dirayain.',\n        bday:'Hari berat pun layak dirayain — happy 34th, Wall\\u2019s.' },\n    ];\n  }\n\n  takeBite = () => this.setState(s => ({ bites: Math.min(5, s.bites + 1) }));\n  reset = () => this.setState({ bites: 0 });\n  rotate(dir) { this.setState(s => ({ mood: (s.mood + dir + 6) % 6, spin: s.spin + 1, bites: 0 })); }\n  setFlavor(f) { this.setState({ flavor: f }); }\n\n  renderVals() {\n    const moods = this.moodList;\n    const i = this.state.mood;\n    const m = moods[i];\n    const flavor = this.state.flavor || this.props.defaultFlavor || 'strawberry';\n    const isStraw = flavor !== 'chocolate';\n    const bday = this.props.birthdayEdition ?? false;\n    const max = 5;\n    const bites = Math.min(max, this.state.bites);\n    const fill = (max - bites) / max;\n    const revealed = bites >= max;\n    const left = max - bites;\n    return {\n      moodColor: m.color, moodColorDeep: m.deep, moodEmoji: m.emoji, moodLabel: m.label,\n      currentQuote: bday ? m.bday : m.quote,\n      editionLabel: bday ? 'Birthday Edition' : 'Everyday Edition',\n      domeTransform: 'scaleY(' + Math.max(0.02, fill).toFixed(3) + ')',\n      flavorColor: isStraw ? '#F2789F' : '#7C4A2A',\n      flavorTop:   isStraw ? '#F9A7C0' : '#9A6238',\n      revealed,\n      rollAnim: (this.state.spin % 2 === 0) ? 'rollA' : 'rollB',\n      biteLabel: revealed ? 'Quote revealed' : ('Take a bite · ' + left + ' left'),\n      moodDots: moods.map((mm, idx) => ({ color: idx === i ? mm.color : '#E4DCD0' })),\n      strawberryBg: isStraw ? '#F2789F' : '#FFFFFF',\n      strawberryFg: isStraw ? '#FFFFFF' : '#6B5E5A',\n      chocolateBg: !isStraw ? '#7C4A2A' : '#FFFFFF',\n      chocolateFg: !isStraw ? '#FFFFFF' : '#6B5E5A',\n      rotatePrev: () => this.rotate(-1),\n      rotateNext: () => this.rotate(1),\n      takeBite: this.takeBite,\n      reset: this.reset,\n      setStrawberry: () => this.setFlavor('strawberry'),\n      setChocolate: () => this.setFlavor('chocolate'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
